# Nightly regeneration -- rebuild docs/samples/operator-console.html
# through the REAL actor (chemistry.render-html, driving
# chemistry.actor/chemistry.governor/chemistry.store) and commit only
# when the rendered console actually changed. Closes flagship checklist
# item 2 (ADR-2607189300 at com-junkawasaki/root) for the ISCO-08
# cluster: this repo previously had NO demo page and no generator at
# all.
#
# JVM Clojure (clojure -M). This repo's deps.edn pins
# kotoba-lang/langgraph directly via :git/sha -- tools.deps resolves it
# (and its own transitive deps) straight from GitHub, so no
# sibling-checkout steps are needed. Reusable template + adaptation
# notes: com-junkawasaki/root 90-docs/business/scripts/
# flagship-generator-template/ (ISIC shape; this repo's ISCO shape
# differs as noted in src/chemistry/render_html.clj's own docstring).
#
# Fork note: this runs on the default GITHUB_TOKEN (contents: write).
# If your org disables Actions, run `clojure -M:render-html` from any
# scheduler.
name: regenerate-console
on:
  schedule:
    - cron: '23 18 * * *'   # 03:23 JST nightly (off-minute on purpose)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: regenerate through the real actor
        run: clojure -M:render-html
      - name: verify (real output, not scaffolding)
        run: |
          grep -q 'chemistry.render-html' docs/samples/operator-console.html
          grep -q '<tbody>' docs/samples/operator-console.html
          test "$(wc -l < docs/samples/operator-console.html)" -gt 30
          echo "operator console sanity ok"
      - name: commit when changed
        run: |
          if ! git diff --quiet docs/; then
            git config user.name "regenerate-console[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            git commit -m "chore(console): nightly regeneration through the real actor"
            git push
          else
            echo "console unchanged"
          fi
